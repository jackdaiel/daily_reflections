<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Reflections</title>
<!-- iPhone ホーム画面アイコン -->
<link rel="apple-touch-icon" href="diarly180.png">
<link rel="apple-touch-icon" sizes="180x180" href="diarly180.png">
<!-- Android/その他のアイコン -->
<link rel="icon" type="image/png" sizes="512x512" href="diarly512.png">
<link rel="icon" type="image/png" sizes="180x180" href="diarly180.png">
<link rel="icon" type="image/png" sizes="32x32" href="diarly180.png">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-dark: #0a0e14;
    --bg-card: #141922;
    --bg-hover: #1c212b;
    --text-primary: #e6edf3;
    --text-secondary: #8b949e;
    --text-muted: #484f58;
    --accent: #58a6ff;
    --accent-bright: #79c0ff;
    --accent-dim: #1f6feb;
    --success: #3fb950;
    --error: #f85149;
    --border: #30363d;
    --border-bright: #484f58;
  }

  html { height: 100%; }

  body {
    font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg-dark);
    background-image: 
      radial-gradient(ellipse 80% 50% at 50% -20%, rgba(88, 166, 255, 0.08), transparent),
      radial-gradient(circle at 100% 100%, rgba(88, 166, 255, 0.03), transparent 40%);
    min-height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
    color: var(--text-primary);
  }

  .container {
    width: 100%;
    max-width: 520px;
    animation: fadeSlideIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ヘッダー */
  .header {
    margin-bottom: 32px;
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 16px;
  }

  .header h1 {
    font-size: clamp(24px, 5vw, 28px);
    font-weight: 500;
    color: var(--text-primary);
    letter-spacing: -0.02em;
  }

  .date-picker-wrapper {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 8px;
  }

  .date-input {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    color: var(--text-primary);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    outline: none;
    transition: all 0.2s;
    cursor: pointer;
  }

  .date-input:hover {
    border-color: var(--border-bright);
  }

  .date-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.1);
  }

  /* カレンダーアイコンの色を変更 */
  .date-input::-webkit-calendar-picker-indicator {
    filter: invert(1);
    cursor: pointer;
  }

  .date-nav-btn {
    width: 32px;
    height: 32px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-secondary);
    font-size: 18px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'IBM Plex Sans', sans-serif;
  }

  .date-nav-btn:hover {
    background: var(--bg-hover);
    border-color: var(--accent);
    color: var(--accent);
  }

  .today-btn {
    padding: 6px 12px;
    background: var(--accent-dim);
    border: 1px solid var(--accent);
    border-radius: 6px;
    color: var(--text-primary);
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'IBM Plex Sans', sans-serif;
  }

  .today-btn:hover {
    background: var(--accent);
  }

  .today-btn.is-today {
    background: var(--success);
    border-color: var(--success);
  }

  .date-display {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-secondary);
    font-weight: 300;
    text-align: center;
    margin-bottom: 4px;
  }

  .date-display.is-today {
    color: var(--accent-bright);
    font-weight: 400;
  }

  .header-subtitle {
    font-size: 14px;
    color: var(--text-muted);
    font-weight: 300;
  }

  /* カード */
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px 24px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  .diary-prompt {
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 24px;
    font-weight: 300;
  }

  /* 入力エリア */
  .entries {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .entry-row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    animation: entrySlideIn 0.4s ease both;
    opacity: 0;
  }
  .entry-row:nth-child(1) { animation-delay: 0.1s; }
  .entry-row:nth-child(2) { animation-delay: 0.15s; }
  .entry-row:nth-child(3) { animation-delay: 0.2s; }
  .entry-row:nth-child(n+4) { animation-delay: 0.25s; }

  @keyframes entrySlideIn {
    from { opacity: 0; transform: translateX(-8px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  .entry-number {
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    background: var(--bg-hover);
    border-radius: 6px;
    flex-shrink: 0;
    margin-top: 6px;
    border: 1px solid var(--border);
  }

  .entry-wrapper {
    flex: 1;
    position: relative;
  }

  .entry-input {
    width: 100%;
    min-height: 40px;
    padding: 10px 40px 10px 14px;
    background: var(--bg-dark);
    border: 1px solid var(--border);
    border-radius: 8px;
    outline: none;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px;
    font-weight: 300;
    line-height: 1.6;
    color: var(--text-primary);
    resize: none;
    transition: all 0.2s ease;
  }

  .entry-input::placeholder {
    color: var(--text-muted);
  }

  .entry-input:focus {
    border-color: var(--accent);
    background: var(--bg-card);
    box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.1);
  }

  .entry-input:hover:not(:focus) {
    border-color: var(--border-bright);
  }

  .btn-remove {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 24px;
    height: 24px;
    background: transparent;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: all 0.2s;
    font-size: 16px;
  }

  .entry-row:hover .btn-remove {
    opacity: 1;
  }

  .btn-remove:hover {
    background: var(--bg-hover);
    color: var(--error);
  }

  /* 追加ボタン */
  .btn-add-wrapper {
    margin-top: 8px;
  }

  .btn-add {
    width: 100%;
    padding: 10px;
    background: transparent;
    border: 1px dashed var(--border);
    border-radius: 8px;
    color: var(--text-muted);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    font-family: 'IBM Plex Sans', sans-serif;
  }

  .btn-add:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(88, 166, 255, 0.05);
  }

  /* 送信ボタン */
  .submit-area {
    margin-top: 24px;
  }

  .btn-submit {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: var(--bg-dark);
    border: none;
    border-radius: 8px;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
  }

  .btn-submit::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent, rgba(255,255,255,0.2));
    opacity: 0;
    transition: opacity 0.2s;
  }

  .btn-submit:hover {
    background: var(--accent-bright);
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(88, 166, 255, 0.3);
  }

  .btn-submit:hover::before { opacity: 1; }
  .btn-submit:active { transform: translateY(0); }
  .btn-submit:disabled { 
    opacity: 0.5; 
    cursor: not-allowed; 
    transform: none; 
    box-shadow: none; 
  }

  /* ステータス */
  .status {
    margin-top: 12px;
    text-align: center;
    font-size: 12px;
    min-height: 18px;
    transition: all 0.3s ease;
  }
  .status.success { color: var(--success); }
  .status.error   { color: var(--error); }
  .status.sending { color: var(--text-secondary); animation: pulse 1.2s infinite; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* リンク */
  .view-link {
    text-align: center;
    margin-top: 20px;
  }
  
  .view-sheet-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 24px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-primary);
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    transition: all 0.2s;
    font-family: 'IBM Plex Sans', sans-serif;
  }
  
  .view-sheet-btn:hover {
    background: var(--bg-hover);
    border-color: var(--accent);
    color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(88, 166, 255, 0.2);
  }

  /* 成功オーバーレイ */
  .sent-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10, 14, 20, 0.95);
    backdrop-filter: blur(8px);
    z-index: 100;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
  }
  .sent-overlay.show { display: flex; animation: fadeIn 0.3s ease; }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .sent-icon {
    font-size: 56px;
    animation: scaleIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes scaleIn {
    from { transform: scale(0); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }

  .sent-message {
    font-size: 18px;
    font-weight: 500;
    color: var(--text-primary);
    animation: fadeSlideIn 0.4s ease 0.2s both;
  }
  .sent-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    animation: fadeSlideIn 0.4s ease 0.3s both;
  }

  @media (max-width: 400px) {
    .card { padding: 24px 20px; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="header-top">
      <h1>Daily Reflections</h1>
    </div>
    <div class="date-picker-wrapper">
      <button class="date-nav-btn" onclick="changeDate(-1)">‹</button>
      <input type="date" class="date-input" id="dateInput" onchange="onDateInputChange()">
      <button class="date-nav-btn" onclick="changeDate(1)">›</button>
      <button class="today-btn" onclick="setToday()">今日</button>
    </div>
  </div>

  <div class="card">
    <div class="entries" id="entriesContainer">
      <!-- エントリーは動的に生成 -->
    </div>

    <div class="btn-add-wrapper">
      <button class="btn-add" id="btnAdd" onclick="addEntry()">
        <span>+</span>
        <span>追加する</span>
      </button>
    </div>

    <div class="submit-area">
      <button class="btn-submit" id="submitBtn" onclick="submitDiary()">
        記録する
      </button>
      <div class="status" id="status"></div>
    </div>
  </div>

  <div class="view-link">
    <a href="https://docs.google.com/spreadsheets/d/17YrrxS88iokyfYPO_YXWJVdXlLgSx0OyQe4Ech6jqbo" target="_blank" id="sheetLink" class="view-sheet-btn">
      <span>📊</span>
      <span>スプレッドシートで振り返る</span>
    </a>
  </div>
</div>

<!-- 送信完了オーバーレイ -->
<div class="sent-overlay" id="sentOverlay" onclick="closeSentOverlay()">
  <div class="sent-icon">✓</div>
  <div class="sent-message">記録完了</div>
  <div class="sent-sub">tap to continue</div>
</div>

<script>
  // ======================================================
  // ⚙️ 設定：ここを変更してください
  // ======================================================
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbzUirCgPHNNQy6WMLRCJWCh7zem_AkXqsYoCl7YCPPNlkwPt0DBcB8ziNAeKPEOduOL/exec'; // Google Apps ScriptのデプロイURL
  const SHEET_URL = 'https://docs.google.com/spreadsheets/d/17YrrxS88iokyfYPO_YXWJVdXlLgSx0OyQe4Ech6jqbo';
  // ======================================================

  let entryCount = 0;
  let selectedDate = new Date();
  let currentUpdateRow = null; // 更新対象の行番号

  // 初期化
  window.addEventListener('DOMContentLoaded', () => {
    console.log('アプリ初期化開始');
    setToday();
    for (let i = 0; i < 3; i++) {
      addEntry();
    }
    console.log('アプリ初期化完了');
  });

  function setToday() {
    console.log('setToday 呼び出し');
    selectedDate = new Date();
    const year = selectedDate.getFullYear();
    const month = String(selectedDate.getMonth() + 1).padStart(2, '0');
    const day = String(selectedDate.getDate()).padStart(2, '0');
    document.getElementById('dateInput').value = `${year}-${month}-${day}`;
    updateDateDisplay();
    loadExistingData();
  }

  function changeDate(delta) {
    console.log('changeDate 呼び出し:', delta);
    const currentDate = new Date(selectedDate);
    currentDate.setDate(currentDate.getDate() + delta);
    selectedDate = currentDate;
    const year = selectedDate.getFullYear();
    const month = String(selectedDate.getMonth() + 1).padStart(2, '0');
    const day = String(selectedDate.getDate()).padStart(2, '0');
    document.getElementById('dateInput').value = `${year}-${month}-${day}`;
    updateDateDisplay();
    loadExistingData();
  }

  function onDateInputChange() {
    console.log('onDateInputChange 呼び出し');
    updateDateDisplay();
    loadExistingData();
  }

  function updateDateDisplay() {
    const dateInput = document.getElementById('dateInput');
    const dateStr = dateInput.value;
    
    if (dateStr) {
      selectedDate = new Date(dateStr + 'T00:00:00');
    }
    
    // 今日ボタンのスタイル更新
    const today = new Date();
    const isToday = 
      selectedDate.getFullYear() === today.getFullYear() &&
      selectedDate.getMonth() === today.getMonth() &&
      selectedDate.getDate() === today.getDate();
    
    const todayBtn = document.querySelector('.today-btn');
    if (todayBtn) {
      if (isToday) {
        todayBtn.classList.add('is-today');
      } else {
        todayBtn.classList.remove('is-today');
      }
    }
  }

  document.getElementById('sheetLink').href = SHEET_URL;

  // 既存データの読み込み
  async function loadExistingData() {
    const year = selectedDate.getFullYear();
    const month = String(selectedDate.getMonth() + 1).padStart(2, '0');
    const day = String(selectedDate.getDate()).padStart(2, '0');
    const dateStr = `${year}-${month}-${day}`;

    try {
      const response = await fetch(`${GAS_URL}?date=${dateStr}`, {
        method: 'GET',
      });

      const data = await response.json();
      
      if (data.status === 'found' && data.entries && data.entries.length > 0) {
        // 既存データがある場合
        currentUpdateRow = data.row;
        
        // 入力欄をクリア
        document.getElementById('entriesContainer').innerHTML = '';
        entryCount = 0;
        
        // 既存データを入力欄に設定
        data.entries.forEach(entry => {
          addEntry();
          const inputs = document.querySelectorAll('.entry-input');
          inputs[inputs.length - 1].value = entry;
        });
        
        // 最低3つは表示
        while (entryCount < 3) {
          addEntry();
        }
        
        setStatus('既存データを読み込みました（編集可能）', 'success');
        setTimeout(() => setStatus('', ''), 3000);
        
      } else {
        // 新規作成モード
        currentUpdateRow = null;
        document.getElementById('entriesContainer').innerHTML = '';
        entryCount = 0;
        for (let i = 0; i < 3; i++) {
          addEntry();
        }
        setStatus('', '');
      }
      
    } catch (err) {
      console.error('データ読み込みエラー:', err);
      // エラーでも新規作成モードで続行
      currentUpdateRow = null;
      if (entryCount === 0) {
        for (let i = 0; i < 3; i++) {
          addEntry();
        }
      }
    }
  }

  function addEntry() {
    entryCount++;
    const container = document.getElementById('entriesContainer');
    
    const row = document.createElement('div');
    row.className = 'entry-row';
    row.dataset.id = entryCount;
    
    row.innerHTML = `
      <div class="entry-number">${entryCount}</div>
      <div class="entry-wrapper">
        <textarea class="entry-input" rows="2" placeholder="入力してください…"></textarea>
        ${entryCount > 3 ? '<button class="btn-remove" onclick="removeEntry(this)">×</button>' : ''}
      </div>
    `;
    
    container.appendChild(row);
    
    const textarea = row.querySelector('.entry-input');
    
    // 自動リサイズ
    textarea.addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = this.scrollHeight + 'px';
    });
    
    // Tabキー対応
    textarea.addEventListener('keydown', function(e) {
      if (e.key === 'Tab') {
        e.preventDefault();
        const inputs = [...document.querySelectorAll('.entry-input')];
        const currentIndex = inputs.indexOf(this);
        const next = inputs[currentIndex + 1];
        if (next) {
          next.focus();
        } else {
          document.getElementById('btnAdd').focus();
        }
      }
    });
  }

  function removeEntry(btn) {
    const row = btn.closest('.entry-row');
    row.style.animation = 'fadeSlideIn 0.3s ease reverse';
    setTimeout(() => row.remove(), 300);
  }

  async function submitDiary() {
    const inputs = document.querySelectorAll('.entry-input');
    const entries = [...inputs].map(el => el.value.trim()).filter(v => v !== '');

    if (entries.length === 0) {
      setStatus('少なくとも1つ入力してください', 'error');
      return;
    }

    if (GAS_URL === 'YOUR_GAS_WEB_APP_URL') {
      setStatus('⚠ GASのURLを設定してください', 'error');
      return;
    }

    const mode = currentUpdateRow ? '更新' : '記録';
    setStatus(`${mode}中…`, 'sending');
    document.getElementById('submitBtn').disabled = true;

    try {
      const year = selectedDate.getFullYear();
      const month = String(selectedDate.getMonth() + 1).padStart(2, '0');
      const day = String(selectedDate.getDate()).padStart(2, '0');
      const dateStr = `${year}-${month}-${day}`;

      const payload = {
        date: dateStr,
        entries: entries,
        updateRow: currentUpdateRow
      };

      console.log('送信データ:', JSON.stringify(payload));
      console.log('送信先URL:', GAS_URL);

      // no-corsモードで送信（レスポンスは見えないが、GASには届く）
      await fetch(GAS_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 
          'Content-Type': 'text/plain;charset=utf-8'
        },
        body: JSON.stringify(payload)
      });

      console.log('送信完了（スプレッドシートを確認してください）');

      showSentOverlay();
      
      // 送信後、十分待ってからデータを再読み込み（リトライ付き）
      setTimeout(async () => {
        await loadExistingDataWithRetry(dateStr, 3);
      }, 3500); // 3.5秒待つ

    } catch (err) {
      console.error('送信エラー:', err);
      setStatus('送信に失敗しました。スプレッドシートを確認してください。', 'error');
      document.getElementById('submitBtn').disabled = false;
    }
  }

  // リトライ機能付きデータ読み込み
  async function loadExistingDataWithRetry(dateStr, maxRetries = 3) {
    for (let i = 0; i < maxRetries; i++) {
      console.log(`データ読み込み試行 ${i + 1}/${maxRetries}`);
      
      try {
        const response = await fetch(`${GAS_URL}?date=${dateStr}`, {
          method: 'GET',
        });

        const data = await response.json();
        
        if (data.status === 'found' && data.entries && data.entries.length > 0) {
          // データが見つかった
          currentUpdateRow = data.row;
          
          // 入力欄をクリア
          document.getElementById('entriesContainer').innerHTML = '';
          entryCount = 0;
          
          // 既存データを入力欄に設定
          data.entries.forEach(entry => {
            addEntry();
            const inputs = document.querySelectorAll('.entry-input');
            inputs[inputs.length - 1].value = entry;
          });
          
          // 最低3つは表示
          while (entryCount < 3) {
            addEntry();
          }
          
          setStatus('保存完了（編集モード）', 'success');
          console.log('データ読み込み成功');
          return; // 成功したので終了
        }
      } catch (err) {
        console.error(`読み込みエラー (試行 ${i + 1}):`, err);
      }
      
      // リトライ前に待機（最後の試行では待たない）
      if (i < maxRetries - 1) {
        await new Promise(resolve => setTimeout(resolve, 2000)); // 2秒待つ
      }
    }
    
    // 全ての試行が失敗した場合
    console.log('データ読み込み失敗（タイムアウト）');
    setStatus('保存完了（確認はスプレッドシートで）', 'success');
    setTimeout(() => setStatus('', ''), 3000);
  }

  function setStatus(msg, type) {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = `status ${type}`;
  }

  function clearForm() {
    document.getElementById('entriesContainer').innerHTML = '';
    entryCount = 0;
    currentUpdateRow = null;
    for (let i = 0; i < 3; i++) {
      addEntry();
    }
    setStatus('', '');
    document.getElementById('submitBtn').disabled = false;
  }

  function showSentOverlay() {
    const message = currentUpdateRow ? '更新完了' : '記録完了';
    document.querySelector('.sent-message').textContent = message;
    document.getElementById('sentOverlay').classList.add('show');
    setTimeout(closeSentOverlay, 2000);
  }

  function closeSentOverlay() {
    document.getElementById('sentOverlay').classList.remove('show');
    document.getElementById('submitBtn').disabled = false;
  }

</script>
</body>
</html>
